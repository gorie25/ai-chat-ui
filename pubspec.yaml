name: ai_chat_ui
description: "A new premium standalone AI Chat application template."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  bloc: ^8.1.2
  flutter_bloc: ^8.1.3
  go_router: ^14.0.0
  google_fonts: ^6.2.1
  flutter_markdown: ^0.6.23
  equatable: ^2.0.5
  image_picker: ^1.1.0
  web_socket_channel: ^2.4.3
  vibration: ^3.1.8
  permission_handler: ^11.3.1
  speech_to_text: ^6.3.0
  shared_preferences: ^2.2.2
  dio: ^5.4.1
  share_plus: ^7.2.2
  flutter_tts: ^3.8.5
  sound_mode: ^3.0.0
  shimmer: ^3.0.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
