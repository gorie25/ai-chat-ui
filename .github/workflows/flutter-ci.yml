name: Flutter CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    name: Unit and E2E Tests
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up FVM
        run: dart pub global activate fvm

      - name: Install Flutter 3.44.0
        run: fvm install 3.44.0

      - name: Install dependencies
        run: fvm flutter pub get

      - name: Run unit tests
        run: fvm flutter test test/unit

      - name: Run E2E tests
        run: fvm flutter test test/e2e

      - name: Run all tests
        run: fvm flutter test
