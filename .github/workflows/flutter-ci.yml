name: Flutter CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    name: Unit and E2E Tests
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter 3.44.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Create CI environment file
        run: |
          cat > .env <<'EOF'
          AI_CHAT_API_URL=https://example.invalid/
          AI_CHAT_WS_URL=wss://example.invalid/ws/
          AI_CHAT_INTERNAL_TOKEN=ci-placeholder
          AI_CHAT_AUTH_TOKEN=ci-placeholder
          AI_CHAT_SHOW_IMAGE=true
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test test/unit

      - name: Run E2E tests
        run: flutter test test/e2e

      - name: Run all tests
        run: flutter test
